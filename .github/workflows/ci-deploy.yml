name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'picture/**'
      - '.markdownlint*'
  pull_request:
    branches:
      - main
  workflow_dispatch:


jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]  # 只测试 3.12，因为 requires-python = ">=3.12"

    steps:
      # 1. 检出代码（加上 fetch-depth: 0 最佳实践）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # 3. 安装依赖和测试工具
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # 4. 运行测试
      - name: Run tests with pytest
        run: |
          pytest -v


  build-and-publish:
    name: Build, Publish Package & Release
    runs-on: ubuntu-latest
    needs: test  # 依赖测试任务
    if: startsWith(github.ref, 'refs/tags/v')  # 只有tag时发布

    steps:
      # 1. 检出代码，必须 fetch 全部历史给 changelogithub 使用
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 3. 安装/升级构建工具
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine

      # 4. 清理旧构建产物
      - name: Clean previous builds
        run: |
          rm -rf dist build *.egg-info

      # 5. 构建 sdist 和 wheel
      - name: Build package
        run: |
          python -m build --sdist --wheel

      # 6. 验证包完整性
      - name: Validate package
        run: |
          twine check dist/*

      # 7. 设置 Node.js（用于 changelogithub 生成 changelog）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 8. 生成 changelog，并创建 GitHub Release
      - name: Generate Changelog and Create Release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

